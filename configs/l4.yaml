# ============================================================
# L4 preset (Colab Pro+ — 24 GB VRAM, bf16 capable)
# Effective batch = 4 × 4 = 16, seq_len between T4 and A100.
# ============================================================

data:
  root: "transmucores_data"
  output_dir: "processed_data"
  languages:
    hi: {name: "Hindi",   codes: ["hin_Deva"]}
    ta: {name: "Tamil",   codes: ["tam_Taml"]}
    bn: {name: "Bengali", codes: ["ben_Beng"]}

preprocessing:
  instruction_id: 5
  max_tokens_per_frame: 512
  min_mentions_per_example: 1

model:
  name: "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  rank: 16
  alpha: 16
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  output_dir: "model_output"
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4    # effective = 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  bf16: true
  fp16: false
  dataloader_num_workers: 2
  seed: 42

inference:
  max_cluster_id: 200
  output_dir: "inference_output"
