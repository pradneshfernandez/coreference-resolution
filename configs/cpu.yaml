# ============================================================
# CPU / low-memory preset (laptop without CUDA)
# Uses Qwen2.5-1.5B-Instruct (no quantization needed).
# Suitable for testing the pipeline end-to-end quickly.
# ============================================================

data:
  root: "transmucores_data"
  output_dir: "processed_data"
  languages:
    hi: {name: "Hindi",   codes: ["hin_Deva"]}
    ta: {name: "Tamil",   codes: ["tam_Taml"]}
    bn: {name: "Bengali", codes: ["ben_Beng"]}

preprocessing:
  instruction_id: 5
  max_tokens_per_frame: 128
  min_mentions_per_example: 1

model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"   # ~3 GB RAM; no GPU required
  max_seq_length: 1024
  load_in_4bit: false

lora:
  rank: 8
  alpha: 8
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, up_proj, down_proj]

training:
  output_dir: "model_output"
  num_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 5
  save_steps: 100
  eval_steps: 100
  bf16: false
  fp16: false
  dataloader_num_workers: 0
  seed: 42

inference:
  max_cluster_id: 200
  output_dir: "inference_output"
