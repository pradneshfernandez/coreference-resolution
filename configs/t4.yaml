# ============================================================
# T4 preset (Colab free tier — 16 GB VRAM)
# Llama 3.1 8B 4-bit via unsloth.  Effective batch = 2 × 8 = 16.
# ============================================================

data:
  root: "transmucores_data"
  output_dir: "processed_data"
  languages:
    hi: {name: "Hindi",   codes: ["hin_Deva"]}
    ta: {name: "Tamil",   codes: ["tam_Taml"]}
    bn: {name: "Bengali", codes: ["ben_Beng"]}

preprocessing:
  instruction_id: 5
  max_tokens_per_frame: 256
  min_mentions_per_example: 1

model:
  name: "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
  max_seq_length: 2048      # reduced from 4096 to fit T4
  load_in_4bit: true

lora:
  rank: 16
  alpha: 16
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  output_dir: "model_output"
  num_epochs: 3
  batch_size: 2                     # T4 safe with 2048 seq_len
  gradient_accumulation_steps: 8    # effective = 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  bf16: false                       # T4 doesn't support bfloat16
  fp16: true
  dataloader_num_workers: 0
  seed: 42

inference:
  max_cluster_id: 200
  output_dir: "inference_output"
